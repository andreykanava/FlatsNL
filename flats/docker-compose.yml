version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: flats_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: flats_admin
      MONGO_INITDB_ROOT_PASSWORD: change_this_now_long_random_password
    volumes:
      - mongo_data:/data/db
    command: ["mongod", "--auth", "--bind_ip_all"]

  scraper:
    build: .
    container_name: flats_scraper
    restart: unless-stopped
    depends_on:
      - mongo
    env_file:
      - .env
    environment:
      MONGO_URI: mongodb://flats_admin:change_this_now_long_random_password@mongo:27017/housing?authSource=admin
      MONGO_DATABASE: housing
      PYTHONUNBUFFERED: 1
    volumes:
      - .:/app
    working_dir: /app
    command: ["python", "flats/watcher.py"]

volumes:
  mongo_data: